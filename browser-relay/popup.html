<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: #1e1e2e; color: #cdd6f4; }

    /* 头部 */
    .header { padding: 12px 14px; background: #181825; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #313244; }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header-icon { width: 24px; height: 24px; border-radius: 6px; background: #7C3AED; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .header-title { font-weight: 700; font-size: 14px; }
    .header-btn { background: #313244; color: #cdd6f4; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .header-btn:hover { background: #45475a; }

    /* 设置区 */
    .settings { padding: 10px 14px; border-bottom: 1px solid #313244; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
    .setting-label { font-size: 13px; color: #a6adc8; }
    .setting-desc { font-size: 11px; color: #6c7086; margin-top: 2px; }

    /* 开关 */
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: #45475a; border-radius: 11px; transition: 0.2s;
    }
    .toggle-slider:before {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 2px; bottom: 2px; background: white; border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #7C3AED; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

    /* 统计 */
    .stats { padding: 8px 14px; font-size: 12px; color: #6c7086; border-bottom: 1px solid #313244; }

    /* 列表 */
    .list { max-height: 300px; overflow-y: auto; padding: 6px; }
    .list::-webkit-scrollbar { width: 4px; }
    .list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 2px; }
    .item { background: #313244; border-radius: 8px; padding: 10px 12px; margin-bottom: 4px; }
    .item:hover { background: #3b3b52; }
    .item-type { font-size: 10px; color: #6c7086; margin-bottom: 4px; }
    .item-content { font-size: 13px; line-height: 1.5; max-height: 56px; overflow: hidden; word-break: break-word; }
    .item-img { max-width: 100%; max-height: 70px; border-radius: 4px; object-fit: cover; }
    .item-url { font-size: 12px; color: #89b4fa; text-decoration: none; display: block; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-actions { display: flex; gap: 2px; margin-top: 6px; justify-content: flex-end; }
    .item-btn { width: 24px; height: 24px; border-radius: 5px; background: transparent; border: none; cursor: pointer; font-size: 11px; color: #a6adc8; display: flex; align-items: center; justify-content: center; }
    .item-btn:hover { background: #45475a; color: #cdd6f4; }
    .item-btn.danger:hover { background: #45273a; color: #f38ba8; }
    .empty { text-align: center; padding: 28px 20px; color: #6c7086; font-size: 13px; }

    /* 底部 */
    .footer { padding: 8px 14px; background: #181825; border-top: 1px solid #313244; }
    .footer-row { display: flex; gap: 6px; }
    .footer-input { flex: 1; background: #313244; border: 1px solid #45475a; color: #cdd6f4; padding: 7px 10px; border-radius: 8px; font-size: 13px; outline: none; }
    .footer-input:focus { border-color: #89b4fa; }
    .footer-input::placeholder { color: #6c7086; }
    .send-btn { width: 32px; height: 32px; border-radius: 8px; background: #7C3AED; color: white; border: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
    .send-btn:hover { background: #6D28D9; }

    .toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #a6e3a1; color: #1e1e2e; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; animation: fade 1.5s forwards; }
    @keyframes fade { 0%,70%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">📋</div>
      <span class="header-title">Obsidian 中转站</span>
    </div>
    <button class="header-btn" id="clipPage">📎 剪藏</button>
  </div>

  <!-- 浮窗设置 -->
  <div class="settings">
    <div class="setting-row">
      <div>
        <div class="setting-label">显示悬浮球</div>
        <div class="setting-desc">在网页右下角显示浮动入口</div>
      </div>
      <label class="toggle"><input type="checkbox" id="toggleFab" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">固定位置</div>
        <div class="setting-desc">关闭后可拖拽悬浮球到任意位置</div>
      </div>
      <label class="toggle"><input type="checkbox" id="togglePinned" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">自动清理</div>
        <div class="setting-desc">超过天数自动删除（收藏的保留）</div>
      </div>
      <select id="retentionDays" style="background:#313244;color:#cdd6f4;border:1px solid #45475a;border-radius:6px;padding:4px 8px;font-size:12px;">
        <option value="0">不清理</option>
        <option value="3">3 天</option>
        <option value="7">7 天</option>
        <option value="14">14 天</option>
        <option value="30">30 天</option>
      </select>
    </div>
  </div>

  <div class="stats" id="stats">加载中...</div>
  <div class="list" id="itemList"></div>
  <div class="footer">
    <div class="footer-row">
      <input class="footer-input" id="quickInput" placeholder="输入文字或链接..." />
      <button class="send-btn" id="sendBtn">+</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
